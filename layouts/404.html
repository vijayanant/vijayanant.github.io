{{ define "main" }}
<section id="404">
    <div class="container">
        <div class="error-content">
            <!-- Header: Immediate Pivot -->
            <div class="error-header">
                <span class="error-code">404</span>
                <h1 class="section-title">An unplanned detour.</h1>
                <p class="error-message section-intro">
                    The link you followed is broken, but your journey doesn't have to be.
                </p>
            </div>

            <!-- Launchpad Actions -->
            <div class="error-actions">
                <a href="{{ "/explore/" | relURL }}" class="button button-primary">
                    {{ partial "icons/lightbulb.html" . }}
                    <span>View Knowledge Map</span>
                </a>
                {{ if .Site.Params.enableSearch }}
                <button id="error-search-trigger" class="button button-primary">
                    {{ partial "icons/search.html" . }}
                    <span>Search site</span>
                </button>
                {{ end }}
                <button id="surprise-me" class="button button-primary">
                    {{ partial "icons/lightbulb.html" . }}
                    <span>Surprise me</span>
                </button>
            </div>
            
            <!-- Minimal Footer -->
            <div class="error-footer">
                <a href="{{ "/" | relURL }}" class="back-home">
                    {{ partial "icons/arrow-right.html" . }}
                    <span>Back to Homepage</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Search
            const errorSearchButton = document.getElementById('error-search-trigger');
            const navSearchButton = document.getElementById('search-button');
            if (errorSearchButton && navSearchButton) {
                errorSearchButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    navSearchButton.click();
                });
            }

            // Surprise Me
            const surpriseButton = document.getElementById('surprise-me');
            if (surpriseButton) {
                const posts = [
                    {{ range where .Site.RegularPages "Section" "posts" }}
                    "{{ .Permalink }}",
                    {{ end }}
                ];
                surpriseButton.addEventListener('click', () => {
                    const randomPost = posts[Math.floor(Math.random() * posts.length)];
                    window.location.href = randomPost;
                });
            }
        });
    </script>
</section>
{{ end }}
